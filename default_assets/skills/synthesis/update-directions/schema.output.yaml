$schema: "http://json-schema.org/draft-07/schema#"
type: object
properties:
  directions_updated:
    type: integer
    description: "Number of directions with changed momentum or state"
  state_transitions:
    type: array
    items:
      type: object
      properties:
        direction_id:
          type: string
        old_state:
          type: string
        new_state:
          type: string
  top_movers:
    type: array
    items:
      type: object
      properties:
        direction_id:
          type: string
        momentum_delta:
          type: number
