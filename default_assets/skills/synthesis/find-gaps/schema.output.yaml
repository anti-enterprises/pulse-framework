$schema: "http://json-schema.org/draft-07/schema#"
type: object
properties:
  gaps_identified:
    type: integer
    description: "Total number of gaps found"
  top_gaps:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        attractiveness:
          type: number
        difficulty:
          type: string
  output_path:
    type: string
    description: "Path to the written gap map file"
