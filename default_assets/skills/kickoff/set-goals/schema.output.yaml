$schema: "http://json-schema.org/draft-07/schema#"
type: object
required:
  - primary
properties:
  primary:
    type: string
    description: "The single most important 90-day outcome"
  secondary:
    type: array
    items:
      type: string
    description: "2-4 supporting goals"
  active_bets:
    type: array
    items:
      type: string
    description: "1-3 experiments with uncertain outcomes"
  constraints:
    type: object
    additionalProperties:
      type: string
    description: "Key-value pairs of strategic constraints"
