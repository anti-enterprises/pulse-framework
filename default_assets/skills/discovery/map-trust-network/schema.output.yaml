$schema: "http://json-schema.org/draft-07/schema#"
type: object
properties:
  trust_network_path:
    type: string
    description: "Path to the trust network YAML"
  voices_mapped:
    type: integer
    description: "Total trust voices identified"
  tier_distribution:
    type: object
    properties:
      tier_1:
        type: integer
      tier_2:
        type: integer
      tier_3:
        type: integer
      tier_4:
        type: integer
