$schema: "http://json-schema.org/draft-07/schema#"
type: object
required:
  - workspace_id
properties:
  workspace_id:
    type: string
    description: "Target workspace ID"
  mode:
    type: string
    enum: [interactive, headless]
    default: interactive
  urls:
    type: array
    items:
      type: string
      format: uri
    description: "Optional list of URLs to classify. If empty, processes ecosystem entities."
