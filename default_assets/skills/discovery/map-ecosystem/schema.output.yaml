$schema: "http://json-schema.org/draft-07/schema#"
type: object
required:
  - entities
properties:
  entities:
    type: array
    items:
      type: object
      required:
        - name
        - strategic_role
      properties:
        name:
          type: string
        url:
          type: string
          format: uri
        strategic_role:
          type: string
          enum:
            - direct_competitor
            - substitute
            - complementary
            - partner_candidate
            - trust_network
            - community_forum
            - review_aggregator
            - ad_library
            - adjacent_winner
            - acquisition_target
        source_kind:
          type: string
          enum: [web_page, rss, podcast, youtube, review_aggregator, ad_library, community_forum, social_platform, other]
        notes:
          type: string
        discovered_via:
          type: string
          description: "How the entity was discovered (customer_profile, web_search, operator_input)"
  role_counts:
    type: object
    additionalProperties:
      type: integer
    description: "Count of entities per strategic role"
