$schema: "http://json-schema.org/draft-07/schema#"
type: object
properties:
  atoms_created:
    type: integer
    description: "Number of atoms extracted from reviews"
  reviews_processed:
    type: integer
    description: "Number of reviews analyzed"
  top_themes:
    type: array
    items:
      type: string
    description: "Most common themes found"
