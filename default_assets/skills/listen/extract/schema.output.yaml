$schema: "http://json-schema.org/draft-07/schema#"
type: object
properties:
  atoms_created:
    type: integer
    description: "Number of new atoms written"
  sources_processed:
    type: integer
    description: "Number of sources successfully processed"
  errors:
    type: array
    items:
      type: object
      properties:
        source_id:
          type: string
        error:
          type: string
    description: "Per-source errors if any"
